trigger:
  branches:
    include:
      - '*'

pr:
  branches:
    include:
      - '*'

pool:
  vmImage: 'ubuntu-latest'

variables:
  NODE_VERSION: '20.x'
  TEST_ENV: 'staging'
  PLAYWRIGHT_TEST_COMMAND: 'npx playwright test'
  PLAYWRIGHT_JUNIT_FILE: 'test-results/junit.xml'

steps:
  - task: UseNode@1
    displayName: 'Use Node.js $(NODE_VERSION)'
    inputs:
      version: '$(NODE_VERSION)'

  - script: npm ci
    displayName: 'Install npm dependencies'

  - script: npx playwright install --with-deps chromium
    displayName: 'Install Playwright browsers'

  - script: $(PLAYWRIGHT_TEST_COMMAND)
    displayName: 'Run Playwright tests'
    env:
      CI: 'true'
      TEST_ENV: $(TEST_ENV)
      BASE_URL: $(BASE_URL)
      METAMOD_USERNAME: $(METAMOD_USERNAME)
      METAMOD_PASSWORD: $(METAMOD_PASSWORD)
      OPENAI_API_KEY: $(OPENAI_API_KEY)
      OPENAI_MODEL: $(OPENAI_MODEL)

  - script: mkdir -p playwright-report test-results
    displayName: 'Ensure report directories exist'
    condition: succeededOrFailed()

  - task: PublishTestResults@2
    displayName: 'Publish JUnit test results'
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '$(PLAYWRIGHT_JUNIT_FILE)'
      searchFolder: '$(System.DefaultWorkingDirectory)'
      mergeTestResults: true
      failTaskOnFailedTests: true
      testRunTitle: 'Playwright E2E Tests'

  - task: PublishPipelineArtifact@1
    displayName: 'Publish Playwright HTML report'
    condition: succeededOrFailed()
    inputs:
      targetPath: '$(System.DefaultWorkingDirectory)/playwright-report'
      artifact: 'playwright-report'

  - task: PublishPipelineArtifact@1
    displayName: 'Publish raw test results'
    condition: succeededOrFailed()
    inputs:
      targetPath: '$(System.DefaultWorkingDirectory)/test-results'
      artifact: 'test-results'
