# Azure DevOps CI for Playwright automation
#
# Required secret variables:
# - METAMOD_USERNAME
# - METAMOD_PASSWORD
#
# Optional variables:
# - TEST_ENV: dev | qa | staging | production
# - BASE_URL: overrides TEST_ENV when set
# - PLAYWRIGHT_TEST_COMMAND: defaults to "npx playwright test"
# - OPENAI_API_KEY: required only for the refinement suite
# - OPENAI_MODEL: optional OpenAI model override

trigger:
  branches:
    include:
      - '*'

pr:
  branches:
    include:
      - '*'

name: 'playwright-$(Date:yyyyMMdd)-$(Rev:r)'

variables:
  NODE_VERSION: '20.x'
  VM_IMAGE: 'ubuntu-latest'
  TEST_ENV: 'staging'
  PLAYWRIGHT_TEST_COMMAND: 'npx playwright test'
  JUNIT_RESULTS_FILE: 'test-results/junit.xml'
  HTML_REPORT_FOLDER: 'playwright-report'
  RAW_RESULTS_FOLDER: 'test-results'

stages:
  - stage: Playwright_CI
    displayName: 'Playwright CI'
    jobs:
      - job: Run_E2E_Tests
        displayName: 'Install, run tests, and publish results'
        pool:
          vmImage: '$(VM_IMAGE)'

        steps:
          - checkout: self
            displayName: 'Checkout repository'

          - task: UseNode@1
            displayName: 'Use Node.js $(NODE_VERSION)'
            inputs:
              version: '$(NODE_VERSION)'

          - bash: npm ci
            displayName: 'Install project dependencies'

          - bash: npx playwright install --with-deps chromium
            displayName: 'Install Playwright browser dependencies'

          - bash: $(PLAYWRIGHT_TEST_COMMAND)
            displayName: 'Execute Playwright test suite'
            env:
              CI: 'true'
              TEST_ENV: $(TEST_ENV)
              BASE_URL: $(BASE_URL)
              METAMOD_USERNAME: $(METAMOD_USERNAME)
              METAMOD_PASSWORD: $(METAMOD_PASSWORD)
              OPENAI_API_KEY: $(OPENAI_API_KEY)
              OPENAI_MODEL: $(OPENAI_MODEL)

          # Publish steps run even when tests fail so failures still keep reports.
          - bash: mkdir -p $(HTML_REPORT_FOLDER) $(RAW_RESULTS_FOLDER)
            displayName: 'Ensure report folders exist'
            condition: always()

          - task: PublishTestResults@2
            displayName: 'Publish test results'
            condition: always()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '$(JUNIT_RESULTS_FILE)'
              searchFolder: '$(System.DefaultWorkingDirectory)'
              mergeTestResults: true
              failTaskOnFailedTests: true
              testRunTitle: 'Playwright E2E Tests'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish Playwright HTML report artifact'
            condition: always()
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/$(HTML_REPORT_FOLDER)'
              artifact: 'playwright-report'

          - task: PublishPipelineArtifact@1
            displayName: 'Publish raw Playwright results artifact'
            condition: always()
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/$(RAW_RESULTS_FOLDER)'
              artifact: 'test-results'
